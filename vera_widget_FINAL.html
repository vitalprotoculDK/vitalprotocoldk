<!-- VERA WIDGET — FINAL -->
<!-- Dil paneli yok | Mobilde gizli | Ana menü ile senkron -->

<style>
/* ── VERA WIDGET ── */
#vera-widget{
  position:fixed;bottom:24px;left:24px;z-index:2147483647;
  font-family:'DM Sans',sans-serif;
}

/* Mobilde tamamen gizle */
@media(max-width:768px){
  #vera-widget{ display:none !important; }
}

#vera-btn{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#2e3d30,#4a5e4c);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(46,61,48,.35);
  position:relative;z-index:2147483647;
}
#vera-btn svg{width:26px;height:26px;fill:#fcfcfa;pointer-events:none}
#vera-btn::after{
  content:'';position:absolute;
  width:100%;height:100%;border-radius:50%;
  border:2px solid #2e3d30;
  animation:vp 2s infinite;opacity:0;
}
@keyframes vp{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}

#vera-panel{
  position:absolute;bottom:68px;left:0;width:340px;
  background:#fff;border-radius:20px;
  box-shadow:0 12px 48px rgba(0,0,0,.18);
  flex-direction:column;overflow:hidden;display:none;
}
#vera-panel.vopen{display:flex}

#vera-head{
  background:linear-gradient(135deg,#2e3d30,#3d5240);
  padding:14px 18px;display:flex;align-items:center;gap:10px;
}
#vera-av{
  width:38px;height:38px;border-radius:50%;
  background:rgba(184,150,62,.2);border:2px solid rgba(184,150,62,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:17px;
  color:#d4ae5e;flex-shrink:0;
}
#vera-hi h4{margin:0;font-size:14px;font-weight:600;color:#fcfcfa;font-family:'Cormorant Garamond',serif}
#vera-hi p{margin:2px 0 0;font-size:11px;color:rgba(252,252,250,.55)}
#vera-x{
  margin-left:auto;background:none;border:none;
  cursor:pointer;color:rgba(252,252,250,.6);font-size:18px;line-height:1;padding:0;
}

/* DİL PANELİ YOK — kaldırıldı */

#vera-msgs{
  overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;max-height:260px;
}
.vm{display:flex;gap:8px;align-items:flex-start}
.vm.vu{flex-direction:row-reverse}
.vmav{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#2e3d30,#4a5e4c);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#d4ae5e;font-family:'Cormorant Garamond',serif;
}
.vm.vu .vmav{background:#f0ede6;color:#2e3d30}
.vmb{
  max-width:220px;padding:9px 13px;border-radius:16px;
  font-size:13px;line-height:1.6;color:#1e2b1f;
  background:#f5f2ec;white-space:pre-wrap;
}
.vm.vu .vmb{background:#2e3d30;color:#fcfcfa;border-radius:16px 16px 4px 16px}
.vm:not(.vu) .vmb{border-radius:4px 16px 16px 16px}

#vera-typing{display:none;gap:8px;align-items:center;padding:4px 14px}
#vera-typing.vs{display:flex}
.vdots{display:flex;gap:4px;padding:10px 13px;background:#f5f2ec;border-radius:4px 16px 16px 16px}
.vdots span{width:5px;height:5px;border-radius:50%;background:#b8963e;animation:vd .8s infinite}
.vdots span:nth-child(2){animation-delay:.15s}
.vdots span:nth-child(3){animation-delay:.3s}
@keyframes vd{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}

#vera-quick{
  padding:6px 14px 2px;display:flex;gap:5px;
  flex-wrap:wrap;border-top:1px solid #f0ede6;
}
.vqb{
  padding:4px 9px;font-size:11px;border-radius:12px;
  border:1px solid #d6ddd7;background:#fff;color:#4a5a4b;
  cursor:pointer;font-family:'DM Sans',sans-serif;
}
#vera-disc{
  padding:7px 14px;font-size:10px;color:#9aaa9b;
  border-top:1px solid #f0ede6;line-height:1.5;background:#fafaf8;
}
#vera-inp-wrap{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #f0ede6}
#vera-inp{
  flex:1;padding:8px 13px;border:1px solid #d6ddd7;
  border-radius:20px;font-size:13px;outline:none;
  font-family:'DM Sans',sans-serif;
}
#vera-inp:focus{border-color:#2e3d30}
#vera-go{
  width:34px;height:34px;border-radius:50%;
  background:#2e3d30;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#vera-go svg{width:14px;height:14px;fill:#fcfcfa;pointer-events:none}
</style>

<div id="vera-widget">
  <button id="vera-btn" aria-label="Vera ile konuş">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  </button>
  <div id="vera-panel">
    <div id="vera-head">
      <div id="vera-av">V</div>
      <div id="vera-hi">
        <h4>Vera</h4>
        <p id="vera-st">vitalprotocolDK · Wellness Rehberi</p>
      </div>
      <button id="vera-x">✕</button>
    </div>
    <!-- #vera-langs KALDIRILDI — ana menü senkronize ediyor -->
    <div id="vera-msgs"></div>
    <div id="vera-typing">
      <div class="vmav">V</div>
      <div class="vdots"><span></span><span></span><span></span></div>
    </div>
    <div id="vera-quick"></div>
    <div id="vera-disc"></div>
    <div id="vera-inp-wrap">
      <input id="vera-inp" type="text" placeholder="Sorunuzu yazın...">
      <button id="vera-go">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  var vL = localStorage.getItem('vpLang') || 'tr';
  var vOpen = false;
  var vHist = [];

  var vT = {
    tr:{
      ph:'Sorunuzu yazın...',
      st:'vitalprotocolDK · Wellness Rehberi',
      disc:'⚠ Bu bilgiler genel rehberlik amaçlıdır, tıbbi reçete yerine geçmez.',
      wel:'Merhaba! Ben Vera 🌿\n\nvitalprotocolDK\'nin wellness rehberiyim. Ürünler, protokoller veya wellness hakkında sana yardımcı olmaktan mutluluk duyarım!',
      q:['Nitro Plus nedir?','Hangi protokol bana uyar?','Ürünleri nereden alırım?','Wellness Üçgeni nedir?']
    },
    en:{
      ph:'Type your question...',
      st:'vitalprotocolDK · Wellness Guide',
      disc:'⚠ Information is for general guidance only, not medical advice.',
      wel:"Hello! I'm Vera 🌿\n\nI'm the wellness guide at vitalprotocolDK. I'm happy to help you with products, protocols or wellness questions!",
      q:['What is Nitro Plus?','Which protocol suits me?','Where can I buy products?','What is the Wellness Triangle?']
    },
    es:{
      ph:'Escribe tu pregunta...',
      st:'vitalprotocolDK · Guía de Bienestar',
      disc:'⚠ La información es orientativa y no reemplaza el consejo médico.',
      wel:'¡Hola! Soy Vera 🌿\n\nSoy la guía de bienestar de vitalprotocolDK. ¡Estoy aquí para ayudarte con productos, protocolos o preguntas de bienestar!',
      q:['¿Qué es Nitro Plus?','¿Qué protocolo me conviene?','¿Dónde puedo comprar?','¿Qué es el Triángulo de Bienestar?']
    }
  };

  var vSys = 'Sen Vera\'sın — vitalprotocolDK wellness rehberi. Deniz KAT adına çalışıyorsun. Samimi, sıcak ama profesyonel ol.\n\nÜRÜNLER: Nitro Plus (Nitrik Oksit, vasküler sağlık), Sunrise (22 süper gıda, B vitamini), Sunset (Omega-3, Astaksantin, gece onarımı), HL5 (Hidrolize Kolajen), FIT20 (fitness protokolü), ORIGIN (temel beslenme), NRGI (hücresel enerji, ATP), EDGE (zihinsel berraklık, dopamin), IGNT (hormonal denge), R-STOUR (sindirim, enzim+probiyotik), ON-SHOTS (anlık odak, adaptogen).\n\nSATIN ALMA: https://amare.com/tr-tr/g10/2180152\n\nSINIRLAR: Asla tıbbi tanı/tedavi önerme. Hamilelik/emzirme sorularında doktora yönlendir.\n\nDİL: Kullanıcı hangi dilde yazarsa o dilde cevap ver. Kısa ve net ol.';

  // ── ANA MENÜ SENKRONIZASYONU ──────────────────────────────────────────────
  // Aynı sayfa içinde setLang() çağrıldığında Vera'yı güncelle
  // Bu fonksiyon index.html'deki setLang() tarafından çağrılır
  window.vSetLang = function(l) {
    if (!vT[l]) return;
    vL = l;
    var inp = document.getElementById('vera-inp');
    var st  = document.getElementById('vera-st');
    var disc= document.getElementById('vera-disc');
    if (inp)  inp.placeholder = vT[l].ph;
    if (st)   st.textContent  = vT[l].st;
    if (disc) disc.textContent= vT[l].disc;
    vRenderQ(l);
  };

  function vRenderQ(l) {
    var q = document.getElementById('vera-quick');
    if (!q) return;
    q.innerHTML = '';
    vT[l].q.forEach(function(txt) {
      var b = document.createElement('button');
      b.className = 'vqb'; b.textContent = txt;
      b.addEventListener('click', function() {
        document.getElementById('vera-inp').value = txt;
        vSend();
      });
      q.appendChild(b);
    });
  }

  function vAddMsg(role, text) {
    var msgs = document.getElementById('vera-msgs');
    var d = document.createElement('div');
    d.className = 'vm' + (role === 'user' ? ' vu' : '');
    var av = document.createElement('div');
    av.className = 'vmav';
    av.textContent = role === 'user' ? '👤' : 'V';
    var b = document.createElement('div');
    b.className = 'vmb'; b.textContent = text;
    d.appendChild(av); d.appendChild(b);
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function vInit() {
    var sl = localStorage.getItem('vpLang') || 'tr';
    vL = sl;
    vSetLang(sl); // widget'ı doğru dile getir
    var msgs = document.getElementById('vera-msgs');
    if (msgs.children.length === 0) vAddMsg('vera', vT[sl].wel);
  }

  async function vSend() {
    var inp = document.getElementById('vera-inp');
    var txt = inp.value.trim();
    if (!txt) return;
    inp.value = '';
    vAddMsg('user', txt);
    vHist.push({role:'user', content:txt});
    document.getElementById('vera-typing').classList.add('vs');
    document.getElementById('vera-quick').style.display = 'none';
    try {
      var ctx = vHist.slice(-6).map(function(m){ return m.role + ': ' + m.content; }).join('\n');
      var r = await fetch('/api/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({messages:[{role:'user', content: vSys + '\n\nKullanıcı dili: ' + vL + '\n\nGeçmiş:\n' + ctx}]})
      });
      var data = await r.json();
      var reply = data.content && data.content[0] ? data.content[0].text : '...';
      vHist.push({role:'assistant', content:reply});
      document.getElementById('vera-typing').classList.remove('vs');
      vAddMsg('vera', reply);
    } catch(e) {
      document.getElementById('vera-typing').classList.remove('vs');
      vAddMsg('vera', {tr:'Bağlantı hatası, tekrar dene.',en:'Connection error, please try again.',es:'Error de conexión, inténtalo de nuevo.'}[vL]);
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('vera-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      vOpen = !vOpen;
      var p = document.getElementById('vera-panel');
      p.classList.toggle('vopen', vOpen);
      if (vOpen) vInit();
    });
    document.getElementById('vera-x').addEventListener('click', function(e) {
      e.stopPropagation();
      vOpen = false;
      document.getElementById('vera-panel').classList.remove('vopen');
    });
    document.getElementById('vera-go').addEventListener('click', function(e) {
      e.stopPropagation(); vSend();
    });
    document.getElementById('vera-inp').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.stopPropagation(); vSend(); }
    });
  });
})();
</script>
<!-- END VERA -->
